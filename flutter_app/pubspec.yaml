name: prakriti_os
description: PrakritiOS App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^12.1.1
  dio: ^5.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.65.0
  flutter_map: ^6.1.0
  health: ^13.0.1
  pdf: ^3.10.4
  flutter_local_notifications: ^17.2.4
  equatable: ^2.0.5
  hydrated_bloc: ^9.1.2
  flutter_secure_storage: ^9.0.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  intl: ^0.18.1
  printing: ^5.12.0
  share_plus: ^7.2.1
  latlong2: ^0.9.0
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/data/prakriti_questions.json
    - assets/data/district_risk.json
    - assets/data/dosha_tips.json
    - assets/data/herb_database.json
    - assets/animations/risk_pulse.json
